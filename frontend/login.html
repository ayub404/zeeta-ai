<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zeeta — Sign in</title>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<div id="loading-bar"></div>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">Zeeta</div>
    <div class="auth-tagline">Supply Intelligence</div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your operations dashboard</p>

    <div class="error-box" id="error-box"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="inp-email" type="email" placeholder="you@company.com"
             autocomplete="email" onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="inp-pass" type="password" placeholder="••••••••"
             autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>

    <button class="auth-btn" id="login-btn" onclick="doLogin()">
      <span id="login-btn-text">Sign in</span>
    </button>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">Create one free</a>
    </div>
    <div class="auth-back">
      <a href="index.html">← Back to homepage</a>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  redirectIfLoggedIn();

  async function doLogin() {
    hideError('error-box');

    const email = document.getElementById('inp-email').value.trim();
    const pass  = document.getElementById('inp-pass').value;

    if (!email || !pass) {
      showError('error-box', 'Please enter your email and password.');
      return;
    }

    setLoading('login-btn', 'login-btn-text', true, 'Sign in');

    const r = await apiLogin(email, pass);

    setLoading('login-btn', 'login-btn-text', false, 'Sign in');

    if (!r.ok) {
      showError('error-box', extractError(r.data));
      return;
    }

    saveSession(r.data);
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
